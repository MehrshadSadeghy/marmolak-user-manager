# Postgres defaults match backend/config/docker.yaml + config.py env overrides.
# Copy .env.example to .env and adjust before first start.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command:
      [
        "postgres",
        "-c",
        "log_statement=none",
        "-c",
        "log_min_messages=error",
        "-c",
        "log_connections=off",
        "-c",
        "log_disconnections=off",
      ]
    logging:
      driver: "none"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-user_manager_db}
      POSTGRES_USER: ${POSTGRES_USER:-user_manager_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-user_manager_user} -d ${POSTGRES_DB:-user_manager_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      RAYA_TRADE_ENVIRONMENT: docker
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-user_manager_db}
      POSTGRES_USER: ${POSTGRES_USER:-user_manager_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
      SUBSCRIPTION_BASE_URL: ${SUBSCRIPTION_BASE_URL:-http://localhost:8080}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
      BOT_API_KEY: ${BOT_API_KEY:-changeme-bot-api-key}
      PAYMENT_INSTRUCTIONS: ${PAYMENT_INSTRUCTIONS:-}
      ADMIN_CHAT_IDS: ${ADMIN_CHAT_IDS:-}
      SUPER_ADMIN_CHAT_IDS: ${SUPER_ADMIN_CHAT_IDS:-}
      USER_MANAGER_API_URL: http://api:8080
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UVICORN_ACCESS_LOG: ${UVICORN_ACCESS_LOG:-0}
      PASARGUARD_PANEL_URL: ${PASARGUARD_PANEL_URL:-}
      PASARGUARD_SUBSCRIPTION_PATH: ${PASARGUARD_SUBSCRIPTION_PATH:-sub}
      PASARGUARD_PANEL_WEBAPP_URL: ${PASARGUARD_PANEL_WEBAPP_URL:-}
      OPENVPN_AUTH_MODE: ${OPENVPN_AUTH_MODE:-certificate}
      OPENVPN_PROVISIONING_AUTH_MODE: ${OPENVPN_PROVISIONING_AUTH_MODE:-}
      OPENVPN_AUTO_APPLY_SERVER_AUTH: ${OPENVPN_AUTO_APPLY_SERVER_AUTH:-false}
      OPENVPN_LEGACY_MIGRATION_ENABLED: ${OPENVPN_LEGACY_MIGRATION_ENABLED:-false}
      OPENVPN_LEGACY_MIGRATION_GRACE_DAYS: ${OPENVPN_LEGACY_MIGRATION_GRACE_DAYS:-7}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
